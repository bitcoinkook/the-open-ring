<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Open Ring</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #0a0a0a; color: #e8e8e0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (async () => {
      try {
        const res = await fetch('openring-mechanical.jsx');
        let code = await res.text();
        code = code.replace(/^\s*import\s+\{[^}]+\}\s+from\s+["']react["'];?\s*$/m,
          'const { useState, useRef, useEffect } = React;');
        code = code.replace(/export\s+default\s+function/, 'function');
        code = code.replace(/const\s+root\s*=\s*ReactDOM\.createRoot[^;]+;\s*root\.render\([^;]+\);?/g, '');
        code += '\nconst __root = ReactDOM.createRoot(document.getElementById("root"));\n__root.render(React.createElement(OpenRingMechanical));';
        const out = Babel.transform(code, { presets: ['react'] }).code;
        new Function(out)();
      } catch (e) {
        document.getElementById('root').innerHTML = '<pre style="color:#e8e8e0;padding:2rem;font-family:monospace;white-space:pre-wrap">Error loading app:\n' + e.message + '</pre>';
      }
    })();
  </script>
</body>
</html>
