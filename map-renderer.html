<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Open Ring — Inversion Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0A0907; color: #ccc; font-family: 'Courier New', monospace; }
  #root { height: 100%; }
  select option { background: #111; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #0A0907; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  input, textarea, select { outline: none; }
  input::placeholder, textarea::placeholder { color: #333; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const STRATA = [
  { name: "SOUL",         short: "SOL",  pillars: ["story","language","value","meaning"],              color: "#E8A87C" },
  { name: "ENVIRONMENT",  short: "ENV",  pillars: ["visibility","infrastructure","commons","regulation"], color: "#7CB9E8" },
  { name: "INSTITUTION",  short: "INST", pillars: ["education","distribution","finance","authority"],   color: "#A87CE8" },
  { name: "RELATIONSHIP", short: "REL",  pillars: ["transparency","trust","reciprocity","status"],      color: "#7CE8B4" },
  { name: "INDIVIDUAL",   short: "IND",  pillars: ["awareness","capacity","energy","identity"],         color: "#E8E87C" },
];

const IMMUNITY = ["education","distribution","finance","legitimacy"];
const SIGNAL_NODES = ["signal","medium","potential","phase"];

const STATE_COLORS = { A:"#70D090", I:"#E85555", D:"#888866", U:"#2A2A2A" };
const STATE_LABELS = { A:"Aligned", I:"Inverted", D:"Drifting", U:"Unknown" };

const defaultMapData = () => ({
  structure: "",
  observer: { position:"INSIDE", relationship:"PAYING", signal_channel:"BODY", signal_weight:"STRONG" },
  strata: STRATA.reduce((acc,s) => { acc[s.name]=s.pillars.reduce((pa,p)=>{pa[p]="U";return pa;},{}); return acc; }, {}),
  immunity: IMMUNITY.reduce((acc,i)=>{acc[i]="capturable";return acc;},{}),
  signalchain: { signal:"yes", medium:"yes", potential:"yes", phase:"local", break_point:"none" },
  seed_crystal: { placement:"", description:"" },
  gradient: "",
  verdict: { state:"INVERTED", diagnosis:"", treatment:"", call_to_action:"" },
  flags: { flag_a:false, flag_b:false, flag_c:false },
});

function polarToXY(cx,cy,r,angleDeg) {
  const rad = ((angleDeg-90)*Math.PI)/180;
  return { x: cx+r*Math.cos(rad), y: cy+r*Math.sin(rad) };
}

function dotPosition(cx,cy,si,pi,innerR,ringW) {
  const r = innerR + ringW*si + ringW/2;
  return polarToXY(cx,cy,r, pi*90+45);
}

// ── SELECT ────────────────────────────────────────────────────────────────────
function Sel({value,onChange,options}) {
  return (
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{background:"#111",border:"1px solid #333",color:"#ccc",
        padding:"4px 8px",borderRadius:4,fontSize:12,fontFamily:"inherit"}}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  );
}

// ── DOT BUTTON ────────────────────────────────────────────────────────────────
function DotBtn({value,onChange}) {
  const cycle={U:"A",A:"I",I:"D",D:"U"};
  const col=STATE_COLORS[value];
  return (
    <button onClick={()=>onChange(cycle[value])} title={STATE_LABELS[value]}
      style={{width:28,height:28,borderRadius:"50%",
        border:`2px solid ${col}`,
        background:value==="U"?"transparent":col+"33",
        color:col,fontSize:11,fontWeight:700,cursor:"pointer",
        fontFamily:"inherit",transition:"all 0.15s"}}>
      {value}
    </button>
  );
}

// ── RADIAL MAP ────────────────────────────────────────────────────────────────
function RadialMap({data}) {
  const size = Math.min(480, window.innerWidth-32);
  const cx=size/2, cy=size/2;
  const innerR=size*0.08;
  const ringW=(size*0.36)/5;
  const immunityR=size*0.47;

  const obsR={INSIDE:innerR*0.4,ADJACENT:innerR*0.7,OUTSIDE:innerR*0.95}[data.observer.position]||innerR*0.5;
  const obsColor={PAYING:"#D4B580",OPERATING:"#60B5E5",WITNESSING:"#888",MIXED:"#A87CE8"}[data.observer.relationship]||"#888";

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}
      style={{display:"block",maxWidth:"100%",margin:"0 auto"}}>
      <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#1a1209"/>
          <stop offset="100%" stopColor="#0A0907"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softglow">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <circle cx={cx} cy={cy} r={size/2} fill="url(#bg)"/>

      {[0,90,180,270].map(a=>{
        const p=polarToXY(cx,cy,size*0.48,a);
        return <line key={a} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#ffffff08" strokeWidth={1}/>;
      })}

      {STRATA[0].pillars.map((p,i)=>{
        const pos=polarToXY(cx,cy,size*0.495,i*90);
        return <text key={p} x={pos.x} y={pos.y} textAnchor="middle" dominantBaseline="middle"
          fill="#ffffff18" fontSize={9} fontFamily="monospace" letterSpacing={2}>
          {p.toUpperCase().slice(0,3)}
        </text>;
      })}

      {STRATA.map((s,si)=>{
        const r=innerR+ringW*si+ringW;
        const rInner=innerR+ringW*si;
        const lp=polarToXY(cx,cy,rInner+ringW/2,0);
        return <g key={si}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={0.5} strokeOpacity={0.15}/>
          <text x={lp.x+4} y={lp.y} textAnchor="start" dominantBaseline="middle"
            fill={s.color} fillOpacity={0.4} fontSize={7} fontFamily="monospace" letterSpacing={1}>
            {s.short}
          </text>
        </g>;
      })}

      <circle cx={cx} cy={cy} r={innerR} fill="#0A0907" stroke="#ffffff10" strokeWidth={1}/>

      {STRATA.map((s,si)=>s.pillars.map((p,pi)=>{
        const val=data.strata[s.name]?.[p]||"U";
        const pos=dotPosition(cx,cy,si,pi,innerR,ringW);
        const col=STATE_COLORS[val];
        const inv=val==="I";
        return <g key={`${si}-${pi}`}>
          {inv&&<circle cx={pos.x} cy={pos.y} r={10} fill={col} fillOpacity={0.15} filter="url(#glow)"/>}
          <circle cx={pos.x} cy={pos.y} r={val==="U"?4:6}
            fill={val==="U"?"transparent":col} stroke={col}
            strokeWidth={val==="U"?1:0} fillOpacity={val==="U"?0:0.85}
            filter={inv?"url(#glow)":"none"}>
            <title>{s.name} · {p} · {STATE_LABELS[val]}</title>
          </circle>
        </g>;
      }))}

      {IMMUNITY.map((im,i)=>{
        const pos=polarToXY(cx,cy,immunityR,i*90+45);
        const free=data.immunity[im]==="free";
        const col=free?"#70D090":"#E85555";
        return <g key={im}>
          <circle cx={pos.x} cy={pos.y} r={5}
            fill={free?col+"44":col+"22"} stroke={col} strokeWidth={1.5}
            filter={free?"none":"url(#glow)"}/>
          <text x={pos.x} y={pos.y+14} textAnchor="middle" dominantBaseline="middle"
            fill={col} fillOpacity={0.6} fontSize={6.5} fontFamily="monospace" letterSpacing={0.5}>
            {im.slice(0,3).toUpperCase()}
          </text>
        </g>;
      })}

      {SIGNAL_NODES.map((node,i)=>{
        const val=data.signalchain[node];
        const isBreak=data.signalchain.break_point===node.toUpperCase();
        const col=isBreak?"#E85555":val==="yes"?"#70D090":val==="partial"?"#D4B580":"#E85555";
        const a=i*90-45;
        const p1=polarToXY(cx,cy,immunityR+12,a);
        const p2=polarToXY(cx,cy,immunityR+12,a+88);
        const mid=polarToXY(cx,cy,immunityR+18,a+44);
        return <path key={node}
          d={`M ${p1.x} ${p1.y} Q ${mid.x} ${mid.y} ${p2.x} ${p2.y}`}
          fill="none" stroke={col} strokeWidth={isBreak?2:1}
          strokeOpacity={isBreak?0.9:0.4} filter={isBreak?"url(#glow)":"none"}/>;
      })}

      <circle cx={cx} cy={cy} r={obsR} fill={obsColor} fillOpacity={0.7} filter="url(#softglow)"/>
      <circle cx={cx} cy={cy} r={obsR*0.5} fill={obsColor} fillOpacity={0.9}/>

      {data.seed_crystal.placement&&(()=>{
        const si=STRATA.findIndex(s=>s.name===data.seed_crystal.placement);
        if(si<0)return null;
        const pos=polarToXY(cx,cy,innerR+ringW*si+ringW/2,225);
        return <g filter="url(#softglow)">
          <polygon points={`${pos.x},${pos.y-9} ${pos.x+8},${pos.y+5} ${pos.x-8},${pos.y+5}`}
            fill="#D4B580" fillOpacity={0.9}>
            <title>Seed Crystal — {data.seed_crystal.placement}</title>
          </polygon>
        </g>;
      })()}

      {Object.entries(STATE_LABELS).map(([k,v],i)=>(
        <g key={k} transform={`translate(${12+i*58},${size-18})`}>
          <circle cx={6} cy={0} r={4}
            fill={k==="U"?"transparent":STATE_COLORS[k]}
            stroke={STATE_COLORS[k]} strokeWidth={k==="U"?1:0}
            fillOpacity={k==="U"?0:0.85}/>
          <text x={13} y={4} fill={STATE_COLORS[k]} fillOpacity={0.7} fontSize={8} fontFamily="monospace">{v}</text>
        </g>
      ))}
    </svg>
  );
}

// ── INPUT PANEL ───────────────────────────────────────────────────────────────
function InputPanel({data,onChange}) {
  const set=(path,value)=>{
    const parts=path.split(".");
    const next=JSON.parse(JSON.stringify(data));
    let cur=next;
    for(let i=0;i<parts.length-1;i++) cur=cur[parts[i]];
    cur[parts[parts.length-1]]=value;
    onChange(next);
  };
  const [open,setOpen]=useState("structure");
  const toggle=s=>setOpen(open===s?null:s);

  const Section=({id,title,children})=>(
    <div style={{marginBottom:8}}>
      <button onClick={()=>toggle(id)} style={{
        width:"100%",textAlign:"left",background:"none",
        border:"none",borderBottom:"1px solid #222",
        color:open===id?"#D4B580":"#666",padding:"8px 0",fontSize:11,
        fontFamily:"monospace",letterSpacing:2,cursor:"pointer",
        display:"flex",justifyContent:"space-between"}}>
        <span>{title}</span>
        <span style={{opacity:0.5}}>{open===id?"▲":"▼"}</span>
      </button>
      {open===id&&<div style={{padding:"12px 0"}}>{children}</div>}
    </div>
  );

  const Row=({label,children})=>(
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
      <span style={{color:"#555",fontSize:10,fontFamily:"monospace",minWidth:100,letterSpacing:1}}>{label}</span>
      {children}
    </div>
  );

  const inputStyle={width:"100%",background:"#111",border:"1px solid #333",
    color:"#D4B580",padding:"6px 8px",borderRadius:4,fontSize:12,
    fontFamily:"monospace",boxSizing:"border-box"};

  const taStyle={width:"100%",background:"#111",border:"1px solid #333",
    color:"#ccc",padding:"6px 8px",borderRadius:4,fontSize:11,
    fontFamily:"monospace",resize:"vertical",boxSizing:"border-box"};

  return (
    <div style={{padding:"0 4px"}}>

      <Section id="structure" title="§ STRUCTURE">
        <input value={data.structure} onChange={e=>set("structure",e.target.value)}
          placeholder="Name the structure precisely — one sentence" style={inputStyle}/>
      </Section>

      <Section id="observer" title="§0 OBSERVER">
        <Row label="POSITION">
          <Sel value={data.observer.position} onChange={v=>set("observer.position",v)}
            options={["INSIDE","ADJACENT","OUTSIDE"].map(v=>({value:v,label:v}))}/>
        </Row>
        <Row label="RELATIONSHIP">
          <Sel value={data.observer.relationship} onChange={v=>set("observer.relationship",v)}
            options={["PAYING","OPERATING","WITNESSING","MIXED"].map(v=>({value:v,label:v}))}/>
        </Row>
        <Row label="CHANNEL">
          <Sel value={data.observer.signal_channel} onChange={v=>set("observer.signal_channel",v)}
            options={["BODY","FINANCIAL","RELATIONAL","RESEARCH","INTUITION","MIXED"].map(v=>({value:v,label:v}))}/>
        </Row>
        <Row label="SIGNAL">
          <Sel value={data.observer.signal_weight} onChange={v=>set("observer.signal_weight",v)}
            options={["STRONG","ADEQUATE","THIN"].map(v=>({value:v,label:v}))}/>
        </Row>
      </Section>

      <Section id="strata" title="§2 STRATUM MAP">
        <div style={{fontSize:10,color:"#444",fontFamily:"monospace",marginBottom:10,letterSpacing:1}}>
          CLICK DOTS TO CYCLE: U → A → I → D → U
        </div>
        {STRATA.map((s,si)=>(
          <div key={si} style={{marginBottom:12}}>
            <div style={{color:s.color,fontSize:10,fontFamily:"monospace",letterSpacing:2,marginBottom:6,opacity:0.8}}>
              {s.name}
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {s.pillars.map((p,pi)=>(
                <div key={pi} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <DotBtn value={data.strata[s.name]?.[p]||"U"} onChange={v=>set(`strata.${s.name}.${p}`,v)}/>
                  <span style={{color:"#444",fontSize:8,fontFamily:"monospace",letterSpacing:0.5}}>
                    {p.slice(0,4).toUpperCase()}
                  </span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </Section>

      <Section id="immunity" title="§4 IMMUNITY">
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {IMMUNITY.map(im=>{
            const free=data.immunity[im]==="free";
            const col=free?"#70D090":"#E85555";
            return (
              <div key={im} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <button onClick={()=>set(`immunity.${im}`,free?"capturable":"free")}
                  style={{width:36,height:36,borderRadius:"50%",
                    border:`2px solid ${col}`,background:col+(free?"22":"11"),
                    color:col,fontSize:9,fontFamily:"monospace",cursor:"pointer",letterSpacing:0.5}}>
                  {free?"FREE":"CAP"}
                </button>
                <span style={{color:"#444",fontSize:8,fontFamily:"monospace",letterSpacing:0.5}}>
                  {im.slice(0,4).toUpperCase()}
                </span>
              </div>
            );
          })}
        </div>
      </Section>

      <Section id="signalchain" title="§3 SIGNAL CHAIN">
        {SIGNAL_NODES.map(node=>(
          <Row key={node} label={node.toUpperCase()}>
            <Sel value={data.signalchain[node]} onChange={v=>set(`signalchain.${node}`,v)}
              options={node==="phase"
                ?["local","regional","global"].map(v=>({value:v,label:v}))
                :["yes","partial","no"].map(v=>({value:v,label:v}))}/>
          </Row>
        ))}
        <Row label="BREAK POINT">
          <Sel value={data.signalchain.break_point} onChange={v=>set("signalchain.break_point",v)}
            options={["none","SIGNAL","MEDIUM","POTENTIAL","PHASE"].map(v=>({value:v,label:v}))}/>
        </Row>
      </Section>

      <Section id="seed" title="SEED CRYSTAL">
        <Row label="STRATUM">
          <Sel value={data.seed_crystal.placement} onChange={v=>set("seed_crystal.placement",v)}
            options={[{value:"",label:"—"},...STRATA.map(s=>({value:s.name,label:s.name}))]}/>
        </Row>
        <textarea value={data.seed_crystal.description}
          onChange={e=>set("seed_crystal.description",e.target.value)}
          placeholder="The minimum intervention — one sentence" rows={2} style={taStyle}/>
      </Section>

      <Section id="verdict" title="VERDICT">
        <Row label="STATE">
          <Sel value={data.verdict.state} onChange={v=>set("verdict.state",v)}
            options={["INVERTED","SOUND","FROZEN","UNGROUNDED","IMMUNE"].map(v=>({value:v,label:v}))}/>
        </Row>
        {["diagnosis","treatment","call_to_action"].map(field=>(
          <div key={field} style={{marginBottom:8}}>
            <div style={{color:"#444",fontSize:9,fontFamily:"monospace",letterSpacing:1,marginBottom:4}}>
              {field.replace("_"," ").toUpperCase()}
            </div>
            <textarea value={data.verdict[field]}
              onChange={e=>set(`verdict.${field}`,e.target.value)}
              placeholder={`One sentence — ${field.replace("_"," ")}`}
              rows={2} style={taStyle}/>
          </div>
        ))}
        <div style={{display:"flex",gap:12,marginTop:8}}>
          {["flag_a","flag_b","flag_c"].map(f=>(
            <label key={f} style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
              <input type="checkbox" checked={data.flags[f]}
                onChange={e=>set(`flags.${f}`,e.target.checked)}
                style={{accentColor:"#D4B580"}}/>
              <span style={{color:data.flags[f]?"#D4B580":"#444",fontSize:9,fontFamily:"monospace",letterSpacing:1}}>
                {f.toUpperCase().replace("_"," ")}
              </span>
            </label>
          ))}
        </div>
      </Section>

    </div>
  );
}

// ── VERDICT PANEL ─────────────────────────────────────────────────────────────
function VerdictPanel({data}) {
  const stateColor={INVERTED:"#E85555",SOUND:"#70D090",FROZEN:"#60B5E5",UNGROUNDED:"#888",IMMUNE:"#D4B580"}[data.verdict.state]||"#888";
  const invertedDots=STRATA.flatMap(s=>s.pillars.filter(p=>data.strata[s.name]?.[p]==="I").map(p=>`${s.short}·${p.slice(0,4).toUpperCase()}`));

  return (
    <div style={{fontFamily:"monospace",fontSize:11}}>
      {(data.flags.flag_a||data.flags.flag_b||data.flags.flag_c)&&(
        <div style={{marginBottom:12,display:"flex",gap:8,flexWrap:"wrap"}}>
          {data.flags.flag_b&&<span style={{color:"#D4B580",border:"1px solid #D4B58044",padding:"2px 8px",fontSize:9,letterSpacing:1}}>⚠ PRELIMINARY</span>}
          {data.flags.flag_a&&<span style={{color:"#E85555",border:"1px solid #E8555544",padding:"2px 8px",fontSize:9,letterSpacing:1}}>⚠ NOMINALLY CONSTANT</span>}
          {data.flags.flag_c&&<span style={{color:"#A87CE8",border:"1px solid #A87CE844",padding:"2px 8px",fontSize:9,letterSpacing:1}}>⚠ STRATUM MISMATCH</span>}
        </div>
      )}

      <div style={{color:"#555",fontSize:9,letterSpacing:2,marginBottom:4}}>STRUCTURE</div>
      <div style={{color:"#D4B580",fontSize:13,marginBottom:16,lineHeight:1.4}}>{data.structure||"—"}</div>

      <div style={{color:"#555",fontSize:9,letterSpacing:2,marginBottom:4}}>STATE</div>
      <div style={{color:stateColor,fontSize:16,fontWeight:700,letterSpacing:3,marginBottom:16}}>{data.verdict.state}</div>

      {invertedDots.length>0&&<>
        <div style={{color:"#555",fontSize:9,letterSpacing:2,marginBottom:6}}>INVERSIONS FOUND</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
          {invertedDots.map(d=><span key={d} style={{color:"#E85555",border:"1px solid #E8555544",padding:"2px 8px",fontSize:9,letterSpacing:1}}>{d}</span>)}
        </div>
      </>}

      {data.verdict.diagnosis&&<>
        <div style={{color:"#555",fontSize:9,letterSpacing:2,marginBottom:4}}>DIAGNOSIS</div>
        <div style={{color:"#aaa",marginBottom:16,lineHeight:1.6,fontSize:11,borderLeft:"2px solid #E8555544",paddingLeft:10}}>{data.verdict.diagnosis}</div>
      </>}

      {data.verdict.treatment&&<>
        <div style={{color:"#555",fontSize:9,letterSpacing:2,marginBottom:4}}>TREATMENT — SEED CRYSTAL</div>
        <div style={{color:"#aaa",marginBottom:4,lineHeight:1.6,fontSize:11,borderLeft:"2px solid #D4B58044",paddingLeft:10}}>{data.verdict.treatment}</div>
        {data.seed_crystal.placement&&<div style={{color:"#D4B58088",fontSize:9,letterSpacing:1,paddingLeft:12,marginBottom:16}}>▲ placed at {data.seed_crystal.placement}</div>}
      </>}

      {data.verdict.call_to_action&&<>
        <div style={{color:"#555",fontSize:9,letterSpacing:2,marginBottom:4}}>CALL TO ACTION</div>
        <div style={{color:"#70D090",marginBottom:16,lineHeight:1.6,fontSize:11,borderLeft:"2px solid #70D09044",paddingLeft:10}}>{data.verdict.call_to_action}</div>
      </>}

      <div style={{color:"#555",fontSize:9,letterSpacing:2,marginBottom:8}}>SIGNAL CHAIN</div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {SIGNAL_NODES.map(node=>{
          const val=data.signalchain[node];
          const isBreak=data.signalchain.break_point===node.toUpperCase();
          const col=isBreak?"#E85555":val==="yes"?"#70D090":val==="partial"?"#D4B580":"#E85555";
          return <span key={node} style={{color:col,border:`1px solid ${col}44`,padding:"2px 8px",fontSize:9,letterSpacing:1,background:isBreak?col+"11":"transparent"}}>
            {node.toUpperCase()}{isBreak?" ✕":""}
          </span>;
        })}
      </div>

      <div style={{color:"#555",fontSize:9,letterSpacing:2,marginBottom:8}}>IMMUNITY</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {IMMUNITY.map(im=>{
          const free=data.immunity[im]==="free";
          return <span key={im} style={{color:free?"#70D090":"#E85555",border:`1px solid ${free?"#70D090":"#E85555"}44`,padding:"2px 8px",fontSize:9,letterSpacing:1}}>
            {im.toUpperCase()} {free?"✓":"✕"}
          </span>;
        })}
      </div>
    </div>
  );
}

// ── EXPORT PANEL ──────────────────────────────────────────────────────────────
function ExportPanel({data}) {
  const [copied,setCopied]=useState(false);
  const json=JSON.stringify(data,null,2);
  const copy=()=>{
    navigator.clipboard.writeText(json).then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    });
  };
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{color:"#555",fontSize:9,fontFamily:"monospace",letterSpacing:2}}>ORP-03 — SIGNAL LEDGER PAYLOAD</span>
        <button onClick={copy} style={{
          background:copied?"#70D09022":"none",border:`1px solid ${copied?"#70D090":"#333"}`,
          color:copied?"#70D090":"#555",padding:"3px 12px",fontSize:9,
          fontFamily:"monospace",letterSpacing:1,cursor:"pointer",borderRadius:2}}>
          {copied?"COPIED":"COPY"}
        </button>
      </div>
      <pre style={{background:"#0d0d0d",border:"1px solid #1a1a1a",color:"#444",fontSize:9,
        fontFamily:"monospace",padding:12,borderRadius:4,overflow:"auto",maxHeight:300,lineHeight:1.6}}>
        {json}
      </pre>
      <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid #1a1a1a"}}>
        <div style={{color:"#555",fontSize:9,fontFamily:"monospace",letterSpacing:2,marginBottom:8}}>FILE TO SIGNAL LEDGER</div>
        <a href="https://bitcoinkook.github.io/the-open-ring/signal-ledger-nostr.html"
          target="_blank" rel="noopener noreferrer"
          style={{color:"#D4B580",fontSize:10,fontFamily:"monospace",letterSpacing:1,textDecoration:"none",
            border:"1px solid #D4B58044",padding:"6px 12px",display:"inline-block"}}>
          openringproject.com/signal-ledger-nostr.html ↗
        </a>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [data,setData]=useState(defaultMapData);
  const [view,setView]=useState("map");

  const invertedCount=STRATA.reduce((acc,s)=>acc+s.pillars.filter(p=>data.strata[s.name]?.[p]==="I").length,0);

  const TabBtn=({id,label})=>(
    <button onClick={()=>setView(id)} style={{
      flex:1,padding:"10px 4px",background:view===id?"#D4B58011":"none",
      border:"none",borderBottom:`2px solid ${view===id?"#D4B580":"transparent"}`,
      color:view===id?"#D4B580":"#444",fontSize:9,fontFamily:"monospace",
      letterSpacing:2,cursor:"pointer",transition:"all 0.15s"}}>
      {label}
    </button>
  );

  return (
    <div style={{background:"#0A0907",minHeight:"100vh",color:"#ccc",
      fontFamily:"'Courier New',monospace",display:"flex",flexDirection:"column"}}>

      <div style={{padding:"16px 20px 12px",borderBottom:"1px solid #1a1a1a",
        display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{color:"#D4B580",fontSize:14,letterSpacing:4,fontWeight:700}}>⭕ OPEN RING</div>
          <div style={{color:"#333",fontSize:8,letterSpacing:3,marginTop:2}}>INVERSION MAP · ORP-02</div>
        </div>
        <div style={{textAlign:"right"}}>
          {data.structure&&<div style={{color:"#555",fontSize:9,letterSpacing:1,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{data.structure}</div>}
          {invertedCount>0&&<div style={{color:"#E85555",fontSize:9,letterSpacing:2,marginTop:2}}>{invertedCount} INVERSION{invertedCount!==1?"S":""}</div>}
        </div>
      </div>

      <div style={{flex:1,overflow:"auto",padding:"16px 16px 0"}}>
        {view==="map"&&<RadialMap data={data}/>}
        {view==="input"&&<InputPanel data={data} onChange={setData}/>}
        {view==="verdict"&&<VerdictPanel data={data}/>}
        {view==="export"&&<ExportPanel data={data}/>}
      </div>

      <div style={{display:"flex",borderTop:"1px solid #1a1a1a",background:"#0A0907",position:"sticky",bottom:0}}>
        <TabBtn id="map" label="MAP"/>
        <TabBtn id="input" label="INPUT"/>
        <TabBtn id="verdict" label="VERDICT"/>
        <TabBtn id="export" label="EXPORT"/>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
